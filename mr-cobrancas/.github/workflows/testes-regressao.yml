name: Testes de Regressão

on:
  push:
    branches: [main]
  pull_request:

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mr-cobrancas/package-lock.json
      - run: cd mr-cobrancas && npm ci
      - run: cd mr-cobrancas && npm run test:regressao
